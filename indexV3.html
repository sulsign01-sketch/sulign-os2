function makeDB(token){
  const h = (extra={}) => ({ "Content-Type":"application/json", apikey:SB_KEY, Authorization:`Bearer ${token||SB_KEY}`, ...extra });
  const q = async (path, opts={}) => {
    try {
      const r = await fetch(`${SB_URL}${path}`, { ...opts, headers:{ ...h(), ...(opts.headers||{}) } });
      const txt = await r.text();
      return txt ? JSON.parse(txt) : null;
    } catch(e) { console.error("DB err:",e); return null; }
  };
  const db = (table) => ({
    select: (cols="*", extra="") => q(`/rest/v1/${table}?select=${cols}${extra}&order=created_at.desc`),
    insert: (data) => q(`/rest/v1/${table}`, { method:"POST", headers:h({"Prefer":"return=representation"}), body:JSON.stringify(data) }),
    update: (match, data) => q(`/rest/v1/${table}?${Object.entries(match).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join("&")}`, { method:"PATCH", headers:h({"Prefer":"return=representation"}), body:JSON.stringify(data) }),
    del: (match) => q(`/rest/v1/${table}?${Object.entries(match).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join("&")}`, { method:"DELETE" }),
  });
  const storage = {
    upload: async (bucket, path, file) => {
      const r = await fetch(`${SB_URL}/storage/v1/object/${bucket}/${path}`, { method:"POST", headers:{ apikey:SB_KEY, Authorization:`Bearer ${token}`, "x-upsert":"true" }, body:file });
      return r.json().catch(()=>({}));
    },
    signedUrl: async (bucket, path) => {
      const r = await fetch(`${SB_URL}/storage/v1/object/sign/${bucket}/${path}`, { method:"POST", headers:h(), body:JSON.stringify({expiresIn:3600}) });
      const d = await r.json().catch(()=>({}));
      return d.signedURL ? `${SB_URL}/storage/v1${d.signedURL}` : null;
    },
  };
  return { db, storage };
}

async function signIn(email, password){
  const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, { method:"POST", headers:{"Content-Type":"application/json", apikey:SB_KEY}, body:JSON.stringify({email,password}) });
  return r.json();
}

const ClientesView = ({db,oss})=>{

// OS FORM

const OSForm = ({initial,allOSs,clientes,db,role,user,onSave,onCancel,onDelete})=>{
  const isNew=!initial?.id;
  const [os,setOS]=useState(()=>initial||{num:nextNum(allOSs),status:"Orçamento",abertura:today(),prazo:"",cliente_id:"",cliente_nome:"",produto:"",descricao:"",dim_h:"",dim_l:"",dim_p:"",material:"",cor:"",iluminacao:"",fixacao:"",instalacao:false,arte_aprovada:false,maquinas:[],obs:"",valor_total:"",entrada:"",pagamento:"",condicao:"",arte_base64:null,arte_filename:"",vetor_path:"",vetor_filename:""});
  const [historico,setHistorico]=useState([]);
  const [saving,setSaving]=useState(false);
  const [upArte,setUpArte]=useState(false);
  const [upVetor,setUpVetor]=useState(false);
  const arteRef=useRef(); const vetorRef=useRef();
  const set=(k,v)=>setOS(p=>({...p,[k]:v}));
  const toggleMaq=m=>set("maquinas",(os.maquinas||[]).includes(m)?os.maquinas.filter(x=>x!==m):[...(os.maquinas||[]),m]);
  const loadHist=async()=>{ if(!initial?.id)return; const r=await db.db("os_historico").select("*",`&os_id=eq.${initial.id}&order=created_at.asc`); if(Array.isArray(r))setHistorico(r); };
  useEffect(()=>{ loadHist(); },[initial?.id]);
  const handleArte=(file)=>{ if(!file)return; setUpArte(true); const r=new FileReader(); r.onload=e=>{set("arte_base64",e.target.result);set("arte_filename",file.name);setUpArte(false);}; r.readAsDataURL(file); };
  const handleVetor=async(file)=>{ if(!file)return; setUpVetor(true); const path=`${(os.num||"OS").replace(/[^a-zA-Z0-9-]/g,"_")}/${Date.now()}_${file.name}`; try{ const r=await db.storage.upload("vetores",path,file); if(r.Key||r.path){set("vetor_path",path);set("vetor_filename",file.name);}else{alert("Erro no upload. Verifique se o bucket 'vetores' foi criado no Supabase Storage.");} }catch(e){alert("Erro: "+e.message);} setUpVetor(false); };
  const downloadVetor=async()=>{ if(!os.vetor_path)return; const signed=await db.storage.signedUrl("vetores",os.vetor_path); if(signed)window.open(signed,"_blank"); else alert("Erro ao gerar link."); };
  const addHist=async(ev)=>{ if(!initial?.id)return; await db.db("os_historico").insert({os_id:initial.id,data:today(),responsavel:user?.nome||"Sistema",evento:ev}); loadHist(); };
  const handleSave=async()=>{ if(!os.num){alert("Informe o Nº da OS.");return;} setSaving(true); try{ const cli=clientes.find(c=>c.id===os.cliente_id); const data={...os,cliente_nome:cli?.nome||os.cliente_nome||"–"}; let savedId; if(isNew){const r=await db.db("ordens_servico").insert(data);const saved=Array.isArray(r)?r[0]:r;savedId=saved?.id;if(savedId)await db.db("os_historico").insert({os_id:savedId,data:today(),responsavel:user?.nome||"Sistema",evento:"OS aberta."});}else{await db.db("ordens_servico").update({id:os.id},{...data,updated_at:new Date().toISOString()});}onSave();}catch(e){alert("Erro: "+e.message);} setSaving(false); };
  const saldo=(parseFloat(os.valor_total)||0)-(parseFloat(os.entrada)||0);
  return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"22px 26px",maxWidth:960,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,paddingBottom:14,borderBottom:`1px solid ${C.greenBorder}`}}>
        <div>
          <div style={{fontSize:17,fontWeight:900,color:C.green}}>{isNew?"Nova Ordem de Serviço":`OS ${os.num} — ${os.cliente_nome||""}`}</div>
          <div style={{fontSize:10,color:ROLE_CONFIG[role]?.color||C.green,marginTop:3,letterSpacing:1,fontWeight:700}}>{ROLE_CONFIG[role]?.label?.toUpperCase()} · {user?.nome}</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {!isNew&&can(role,"canDelete")&&<Btn variant="danger" small onClick={onDelete}>🗑 Excluir</Btn>}
          <Btn variant="ghost" small onClick={onCancel}>✕ Fechar</Btn>
        </div>
      </div>
      {/* Status bar */}
      <div style={{display:"flex",borderRadius:7,overflow:"hidden",border:`1px solid ${C.border}`,marginBottom:20}}>
        {STATUS_LIST.map((s,i)=>{const active=os.status===s,past=STATUS_LIST.indexOf(os.status)>i,sc=SC[s];return <button key={s} onClick={()=>can(role,"canUpdateStatus")&&set("status",s)} style={{flex:1,padding:"8px 4px",border:0,borderRight:i<4?`1px solid ${C.border}`:"none",cursor:can(role,"canUpdateStatus")?"pointer":"default",fontWeight:700,fontSize:10,background:active?sc.bg:past?`${sc.bg}55`:C.card2,color:active?sc.text:past?`${sc.text}66`:C.textSub,letterSpacing:0.5,fontFamily:"inherit"}}>{active?"▶ ":""}{s}</button>;})}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:20}}>
        {/* 1. Identificação */}

            <DInput label="Nº OS" value={os.num} onChange={v=>set("num",v)} required/>
            <DInput label="Abertura" value={os.abertura} onChange={v=>set("abertura",v)} type="date"/>
            <DInput label="Prazo de Entrega" value={os.prazo} onChange={v=>set("prazo",v)} type="date"/>
          </div>
          <div style={{marginTop:9,padding:"7px 11px",background:C.greenBg,borderRadius:6,fontSize:10,color:C.green,border:`1px solid ${C.greenBorder}`}}>

              <Label>Arquivo Vetorial (download)</Label>
              <div style={{marginTop:7,border:`2px dashed ${C.blue}33`,borderRadius:10,padding:14,textAlign:"center",background:`${C.blue}07`,cursor:"pointer",minHeight:90}} onClick={()=>!os.vetor_path&&vetorRef.current?.click()}>
                {os.vetor_path?(<div><div style={{fontSize:24,marginBottom:5}}>📐</div><div style={{fontSize:11,color:C.blue,fontWeight:700}}>{os.vetor_filename}</div><div style={{display:"flex",gap:7,justifyContent:"center",marginTop:9}}><button onClick={e=>{e.stopPropagation();downloadVetor();}} style={{background:C.blueBg,color:C.blue,border:`1px solid ${C.blueBorder}`,borderRadius:4,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:700}}>⬇ Download</button><button onClick={e=>{e.stopPropagation();set("vetor_path","");set("vetor_filename","");vetorRef.current?.click();}} style={{background:C.redBg,color:C.red,border:`1px solid ${C.redBorder}`,borderRadius:4,padding:"4px 9px",fontSize:11,cursor:"pointer"}}>Trocar</button></div></div>):(<div><div style={{fontSize:24,marginBottom:5}}>📐</div><div style={{fontSize:11,color:C.blue,fontWeight:600}}>{upVetor?"Enviando...":"Upload do vetor"}</div><div style={{fontSize:9,color:C.textSub,marginTop:3}}>DXF, AI, SVG, PDF, CDR, EPS</div></div>)}
              </div>
              <input ref={vetorRef} type="file" accept=".dxf,.ai,.svg,.pdf,.cdr,.eps,.plt" style={{display:"none"}} onChange={e=>handleVetor(e.target.files[0])}/>
            </div>
          </div>
        </div>
        {/* 5. Máquinas */}
        <div><SH icon="⚙️" title="5. Máquinas Envolvidas" color={C.green}/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7}}>
            {MACHINES.map((m,i)=>{const sel=(os.maquinas||[]).includes(m),color=MCOLORS[i];return <button key={m} onClick={()=>toggleMaq(m)} style={{padding:"9px 12px",borderRadius:7,border:`2px solid ${sel?color:C.border}`,background:sel?`${color}12`:C.card2,cursor:"pointer",display:"flex",alignItems:"center",gap:7,fontWeight:sel?700:500,color:sel?color:C.textSub,fontSize:12,transition:"all .12s",fontFamily:"inherit"}}><span style={{width:8,height:8,borderRadius:"50%",background:sel?color:C.border,flexShrink:0}}/>{m}</button>;})}
          </div>
        </div>
        {/* 6. Financeiro — com máscara */}
        {can(role,"canFinancial")&&(
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 13px",marginBottom:12,background:C.card2,borderRadius:7,borderLeft:`3px solid ${C.orange}`}}>
              <span style={{fontSize:13}}>💰</span>
              <span style={{color:C.orange,fontWeight:800,fontSize:11,letterSpacing:1.5,textTransform:"uppercase"}}>6. Financeiro</span>
              <span style={{fontSize:10,color:C.textSub,marginLeft:"auto"}}>👁 Clique nos valores para revelar</span>
            </div>
            <div className="form-grid" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
              <DInput label="Valor Total (R$)" value={os.valor_total} onChange={v=>set("valor_total",v)} type="number"/>
              <DInput label="Entrada Recebida (R$)" value={os.entrada} onChange={v=>set("entrada",v)} type="number"/>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <Label>Saldo a Receber</Label>
                <div style={{padding:"9px 12px",border:`2px solid ${saldo>0?C.orange:C.green}`,borderRadius:6,background:saldo>0?C.orangeBg:C.greenBg}}>
                  <FinancialValue value={saldo} size={16} bold color={saldo>0?C.orange:C.green}/>
                </div>
              </div>
              <DSelect label="Forma de Pagamento" value={os.pagamento} onChange={v=>set("pagamento",v)} options={PAYS}/>
              <DInput label="Condição de Entrega" value={os.condicao} onChange={v=>set("condicao",v)} col={2} placeholder="Liberado após pgto / Entrega antes..."/>
            </div>
          </div>
        )}
        {/* 7. Histórico */}
        {!isNew&&(
          <div><SH icon="📝" title="7. Histórico" color={C.textSub}/>
            <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:9}}>
              {historico.length===0&&<div style={{color:C.textMuted,fontSize:13,padding:"7px 11px"}}>Nenhum evento.</div>}
              {historico.map((h,i)=>(
                <div key={h.id||i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"7px 11px",background:i%2===0?C.card2:C.card3,borderRadius:5}}>
                  <span style={{fontSize:10,fontWeight:700,color:C.blue,whiteSpace:"nowrap"}}>{fmtDate(h.data)}</span>
                  <span style={{fontSize:10,fontWeight:700,color:C.textSub,whiteSpace:"nowrap"}}>{h.responsavel}</span>
                  <span style={{fontSize:12,color:C.text}}>{h.evento}</span>
                </div>
              ))}
            </div>
            <button onClick={async()=>{const ev=prompt("Descreva o evento:");if(ev)await addHist(ev);}} style={{padding:"5px 13px",background:C.blueBg,color:C.blue,border:`1px solid ${C.blueBorder}`,borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>+ Registrar Evento</button>
          </div>
        )}
        <div style={{display:"flex",gap:9,justifyContent:"flex-end",paddingTop:12,borderTop:`1px solid ${C.border}`}}>
          <Btn variant="ghost" onClick={onCancel}>Cancelar</Btn>
          <Btn onClick={handleSave} disabled={saving}>{saving?"Salvando...":"✓ Salvar OS"}</Btn>
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════
function App(){
  const [session,setSession]=useState(null);
  const [view,setView]=useState("kanban");
  const [oss,setOSs]=useState([]);
  const [clientes,setClientes]=useState([]);
  const [editOS,setEditOS]=useState(null);
  const [search,setSearch]=useState("");
  const [booting,setBooting]=useState(true);

  useEffect(()=>{ stGet("ss-session").then(s=>{ if(s)setSession(s); setBooting(false); }); },[]);

  const db=session?makeDB(session.token):null;
  const loadData=useCallback(async()=>{ if(!db)return; const[r1,r2]=await Promise.all([db.db("ordens_servico").select(),db.db("clientes").select()]); if(Array.isArray(r1))setOSs(r1); if(Array.isArray(r2))setClientes(r2); },[session]);
  useEffect(()=>{ if(db)loadData(); },[db]);

  const handleLogin=async(email,password)=>{
    const r=await signIn(email,password);
    if(r.error||!r.access_token)throw new Error(r.error_description||r.error||"Credenciais inválidas");
    const db2=makeDB(r.access_token);
    const profiles=await db2.db("profiles").select("*",`&id=eq.${r.user.id}`);
    const profile=Array.isArray(profiles)&&profiles[0];
    const ses={token:r.access_token,userId:r.user.id,email:r.user.email,role:profile?.role||"gerente",nome:profile?.nome||email};
    setSession(ses); await stSet("ss-session",ses);
  };
  const handleLogout=async()=>{ setSession(null); await stDel("ss-session"); };
  const handleStatusChange=async(id,status)=>{ if(!db)return; await db.db("ordens_servico").update({id},{status,updated_at:new Date().toISOString()}); await db.db("os_historico").insert({os_id:id,data:today(),responsavel:session.nome,evento:`Status → ${status}`}); loadData(); };
  const handleDeleteOS=async()=>{ if(!editOS?.id||!window.confirm("Excluir esta OS?"))return; await db.db("os_historico").del({os_id:editOS.id}); await db.db("ordens_servico").del({id:editOS.id}); setEditOS(null);setView("kanban");loadData(); };

  const role=session?.role||"gerente";
  const totalAberto=oss.filter(o=>o.status!=="Entregue").length;
  const totalSaldo=oss.filter(o=>o.status!=="Entregue").reduce((a,o)=>a+(parseFloat(o.valor_total)||0)-(parseFloat(o.entrada)||0),0);
  const vencidas=oss.filter(o=>o.prazo&&!["Entregue","Concluído"].includes(o.status)&&new Date(o.prazo+"T12:00")<new Date()).length;
  const faturado=oss.filter(o=>o.status==="Entregue").reduce((a,o)=>a+(parseFloat(o.valor_total)||0),0);

  if(booting)return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Arial",color:C.green,fontSize:14,fontWeight:700,letterSpacing:3}}>SUL SIGN · INICIANDO...</div>;
  if(!session)return <LoginScreen onLogin={handleLogin}/>;

  if(view==="nova"||view==="edit")return(
    <div style={{fontFamily:"Arial",background:C.bg,minHeight:"100vh",padding:22}}>
      <div style={{maxWidth:980,margin:"0 auto"}}>
        <button onClick={()=>{setView("kanban");setEditOS(null);}} style={{background:"none",border:"none",color:C.green,cursor:"pointer",fontSize:16,fontWeight:700,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>← Voltar ao Painel</button>
        <OSForm initial={editOS} allOSs={oss} clientes={clientes} db={db} role={role} user={session} onSave={()=>{loadData();setView("kanban");setEditOS(null);}} onCancel={()=>{setView("kanban");setEditOS(null);}} onDelete={handleDeleteOS}/>
      </div>
    </div>
  );

  return(
    <div style={{fontFamily:"Arial",background:C.bg,minHeight:"100vh",color:C.text}}>
      {/* Header */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.greenBorder}`,padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:30,height:30,background:C.green,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:900,color:"#000",boxShadow:C.greenGlow}}>S</div>
          <div><div style={{color:C.green,fontWeight:900,fontSize:13,letterSpacing:1.5}}>SUL SIGN GROUP</div><div style={{color:C.textSub,fontSize:9,letterSpacing:2}}>GESTÃO OPERACIONAL</div></div>
        </div>
        <div className="header-nav" style={{display:"flex",gap:1}}>
          {[["kanban","📊","Kanban"],["lista","📋","Lista"],["maquinas","⚙️","Máquinas"],["clientes","👥","Clientes"]].map(([v,i,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{padding:"6px 12px",border:"none",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:view===v?800:500,background:view===v?C.greenBg:"transparent",color:view===v?C.green:C.textSub,borderBottom:view===v?`2px solid ${C.green}`:"2px solid transparent",fontFamily:"inherit"}}>{i} {l}</button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:700,color:C.text}}>{session.nome}</div><div style={{fontSize:9,color:ROLE_CONFIG[role]?.color||C.green,letterSpacing:1,fontWeight:800}}>{ROLE_CONFIG[role]?.label?.toUpperCase()}</div></div>
          <button onClick={()=>{setEditOS(null);setView("nova");}} style={{padding:"6px 14px",background:C.green,color:"#000",border:"none",borderRadius:7,cursor:"pointer",fontWeight:800,fontSize:12,boxShadow:C.greenGlow}}>+ Nova OS</button>
          <button onClick={handleLogout} style={{padding:"6px 11px",background:"transparent",color:C.textSub,border:`1px solid ${C.border}`,borderRadius:7,cursor:"pointer",fontSize:10}}>Sair</button>
        </div>
      </div>
      <div style={{padding:"16px 14px"}}>
        {/* KPIs */}
        <div className="kpi-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:11,marginBottom:16}}>
          <KPI icon="📋" label="OSs em Aberto" value={totalAberto} sub={`de ${oss.length} total`} color={C.blue}/>
          <KPI icon="💰" label="A Receber" value={fmt(totalSaldo)} sub="Saldo pendente" color={C.orange} masked/>
          <KPI icon="⚠️" label="Vencidas" value={vencidas} sub="Prazo ultrapassado" color={vencidas>0?C.red:C.green}/>
          <KPI icon="✅" label="Faturado" value={fmt(faturado)} sub="OSs entregues" color={C.green} masked/>
        </div>
        {/* Search */}
        {(view==="kanban"||view==="lista")&&(
          <div style={{display:"flex",gap:9,marginBottom:13}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Buscar por cliente, nº OS, produto..." style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 13px",color:C.text,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
            {search&&<Btn variant="dim" small onClick={()=>setSearch("")}>✕</Btn>}
          </div>
        )}
        {view==="kanban"&&<KanbanView oss={oss} role={role} onOpen={o=>{setEditOS(o);setView("edit");}} onStatusChange={handleStatusChange} search={search}/>}
        {view==="lista"&&<ListaView oss={oss} role={role} onOpen={o=>{setEditOS(o);setView("edit");}} search={search}/>}
        {view==="maquinas"&&<MaquinasView oss={oss} onOpen={o=>{setEditOS(o);setView("edit");}}/>}
        {view==="clientes"&&<ClientesView db={db} oss={oss}/>}
      </div>
    </div>
  );
}

const _root=ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(App));
</script>
</body>
</html>
