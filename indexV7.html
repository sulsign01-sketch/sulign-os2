function makeDB(token) {
  const h = (extra = {}) => ({
    "Content-Type": "application/json",
    apikey: SB_KEY,
    Authorization: `Bearer ${token || SB_KEY}`,
    ...extra
  });
  const q = async (path, opts = {}) => {
    try {
      const r = await fetch(`${SB_URL}${path}`, {
        ...opts,
        headers: {
          ...h(),
          ...(opts.headers || {})
        }
      });
      const txt = await r.text();
      return txt ? JSON.parse(txt) : null;
    } catch (e) {
      console.error("DB err:", e);
      return null;
    }
  };
  const db = table => ({
    select: (cols = "*", extra = "") => q(`/rest/v1/${table}?select=${cols}${extra}&order=created_at.desc`),
    insert: data => q(`/rest/v1/${table}`, {
      method: "POST",
      headers: h({
        "Prefer": "return=representation"
      }),
      body: JSON.stringify(data)
    }),
    update: (match, data) => q(`/rest/v1/${table}?${Object.entries(match).map(([k, v]) => `${k}=eq.${encodeURIComponent(v)}`).join("&")}`, {
      method: "PATCH",
      headers: h({
        "Prefer": "return=representation"
      }),
      body: JSON.stringify(data)
    }),
    del: match => q(`/rest/v1/${table}?${Object.entries(match).map(([k, v]) => `${k}=eq.${encodeURIComponent(v)}`).join("&")}`, {
      method: "DELETE"
    })
  });
  const storage = {
    upload: async (bucket, path, file) => {
      const r = await fetch(`${SB_URL}/storage/v1/object/${bucket}/${path}`, {
        method: "POST",
        headers: {
          apikey: SB_KEY,
          Authorization: `Bearer ${token}`,
          "x-upsert": "true",
          "Content-Type": file.type || "application/octet-stream"
        },
        body: file
      });
      return r.json().catch(() => ({}));
    },
    signedUrl: async (bucket, path) => {
      const r = await fetch(`${SB_URL}/storage/v1/object/sign/${bucket}/${path}`, {
        method: "POST",
        headers: h(),
        body: JSON.stringify({
          expiresIn: 3600
        })
      });
      const d = await r.json().catch(() => ({}));
      return d.signedURL ? (d.signedURL.startsWith("http") ? d.signedURL : `${SB_URL}/storage/v1${d.signedURL}`) : null;
    }
  };
  return {
    db,
    storage
  };
}
async function signIn(email, password) {
  const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SB_KEY
    },
    body: JSON.stringify({
      email,
      password
    })
  });
  return r.json();
}

}
async function stSet(k, v) {
  try {
    await window.storage.set(k, JSON.stringify(v));
  } catch {}
}
async function stDel(k) {
  try {
    await window.storage.delete(k);
  } catch {}
}
